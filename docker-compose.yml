services:
  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: trident
      POSTGRES_PASSWORD: trident_local
      POSTGRES_DB: trident
    ports:
      - "5433:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U trident"]
      interval: 5s
      timeout: 5s
      retries: 10

  backend:
    build:
      context: ./apps/backend
      dockerfile: Dockerfile.dev
    restart: unless-stopped
    ports:
      - "8000:8000"
    volumes:
      - ./apps/backend:/app
    env_file:
      - .env
    environment:
      # Override DATABASE_URL to use the local postgres container
      DATABASE_URL: postgresql+asyncpg://trident:trident_local@postgres:5432/trident
    depends_on:
      postgres:
        condition: service_healthy
    command: uvicorn main:app --host 0.0.0.0 --port 8000 --reload

  node-backend:
    build:
      context: ./apps/node-backend
      dockerfile: Dockerfile.dev
    restart: unless-stopped
    ports:
      - "3001:3001"
    volumes:
      - ./apps/node-backend:/app
      - /app/node_modules
    env_file:
      - .env
    depends_on:
      - backend

volumes:
  postgres_data:
