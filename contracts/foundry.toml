[profile.default]
src = "src"
out = "out"
libs = ["lib"]
test = "test"
script = "script"
optimizer = true
optimizer_runs = 200
solc_version = "0.8.24"
via_ir = true

[rpc_endpoints]
arc_testnet = "https://rpc.testnet.arc.network"

[etherscan]
arc_testnet = { key = "placeholder", url = "https://testnet.arcscan.app/api" }

[fmt]
line_length = 100
tab_width = 4
bracket_spacing = true
