name: Deploy Trident Agent

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  # ── Frontend → Vercel ──────────────────────────────────────────
  deploy-frontend:
    name: Deploy Frontend to Vercel
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: apps/frontend
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: apps/frontend/package-lock.json

      - name: Install dependencies
        run: npm install

      - name: Build
        env:
          VITE_API_URL: ${{ secrets.VITE_API_URL }}
          VITE_NODE_API_URL: ${{ secrets.VITE_NODE_API_URL }}
          VITE_WC_PROJECT_ID: ${{ secrets.VITE_WC_PROJECT_ID }}
          VITE_ARC_RPC_URL: https://rpc.testnet.arc.network
          VITE_ARC_CHAIN_ID: "5042002"
          VITE_TRIDENT_TOKEN_ADDRESS: ${{ secrets.VITE_TRIDENT_TOKEN_ADDRESS }}
          VITE_AGENT_REGISTRY_ADDRESS: ${{ secrets.VITE_AGENT_REGISTRY_ADDRESS }}
          VITE_TRIDENT_ESCROW_ADDRESS: ${{ secrets.VITE_TRIDENT_ESCROW_ADDRESS }}
          VITE_REPUTATION_BOND_ADDRESS: ${{ secrets.VITE_REPUTATION_BOND_ADDRESS }}
        run: npm run build

      - name: Deploy to Vercel
        if: github.ref == 'refs/heads/main'
        uses: amondnet/vercel-action@v25
        with:
          vercel-token: ${{ secrets.VERCEL_TOKEN }}
          vercel-org-id: ${{ secrets.VERCEL_ORG_ID }}
          vercel-project-id: ${{ secrets.VERCEL_PROJECT_ID }}
          working-directory: apps/frontend
          vercel-args: "--prod"

  # ── Python Backend → Railway ───────────────────────────────────
  deploy-python-backend:
    name: Deploy Python Backend to Railway
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main'
    steps:
      - uses: actions/checkout@v4

      - name: Install Railway CLI
        run: npm install -g @railway/cli

      - name: Deploy Python backend
        env:
          RAILWAY_TOKEN: ${{ secrets.RAILWAY_TOKEN_PYTHON }}
        run: |
          cd apps/backend
          railway up --service trident-python-backend

  # ── Node Backend → Railway ─────────────────────────────────────
  deploy-node-backend:
    name: Deploy Node Backend to Railway
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main'
    steps:
      - uses: actions/checkout@v4

      - name: Install Railway CLI
        run: npm install -g @railway/cli

      - name: Deploy Node backend
        env:
          RAILWAY_TOKEN: ${{ secrets.RAILWAY_TOKEN_NODE }}
        run: |
          cd apps/node-backend
          railway up --service trident-node-backend
