name: Deploy Trident Agent

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  # ── Frontend: build check on every push/PR ─────────────────────
  build-frontend:
    name: Build Frontend
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: apps/frontend
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Install dependencies
        run: npm install

      - name: Build
        env:
          VITE_API_URL: ${{ secrets.VITE_API_URL || 'http://localhost:8000' }}
          VITE_NODE_API_URL: ${{ secrets.VITE_NODE_API_URL || 'http://localhost:3001' }}
          VITE_WC_PROJECT_ID: ${{ secrets.VITE_WC_PROJECT_ID || 'placeholder' }}
          VITE_ARC_RPC_URL: https://rpc.testnet.arc.network
          VITE_ARC_CHAIN_ID: "5042002"
          VITE_TRIDENT_TOKEN_ADDRESS: ${{ secrets.VITE_TRIDENT_TOKEN_ADDRESS || '' }}
          VITE_AGENT_REGISTRY_ADDRESS: ${{ secrets.VITE_AGENT_REGISTRY_ADDRESS || '' }}
          VITE_TRIDENT_ESCROW_ADDRESS: ${{ secrets.VITE_TRIDENT_ESCROW_ADDRESS || '' }}
          VITE_REPUTATION_BOND_ADDRESS: ${{ secrets.VITE_REPUTATION_BOND_ADDRESS || '' }}
        run: npm run build

  # ── Deploy Frontend → Vercel (main branch only) ────────────────
  deploy-frontend:
    name: Deploy Frontend to Vercel
    runs-on: ubuntu-latest
    needs: build-frontend
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    defaults:
      run:
        working-directory: apps/frontend
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Install dependencies
        run: npm install

      - name: Deploy to Vercel
        uses: amondnet/vercel-action@v25
        with:
          vercel-token: ${{ secrets.VERCEL_TOKEN }}
          vercel-org-id: ${{ secrets.VERCEL_ORG_ID }}
          vercel-project-id: ${{ secrets.VERCEL_PROJECT_ID }}
          working-directory: apps/frontend
          vercel-args: "--prod"
        env:
          VITE_API_URL: ${{ secrets.VITE_API_URL }}
          VITE_NODE_API_URL: ${{ secrets.VITE_NODE_API_URL }}
          VITE_WC_PROJECT_ID: ${{ secrets.VITE_WC_PROJECT_ID }}
          VITE_ARC_RPC_URL: https://rpc.testnet.arc.network
          VITE_TRIDENT_TOKEN_ADDRESS: ${{ secrets.VITE_TRIDENT_TOKEN_ADDRESS }}
          VITE_AGENT_REGISTRY_ADDRESS: ${{ secrets.VITE_AGENT_REGISTRY_ADDRESS }}
          VITE_TRIDENT_ESCROW_ADDRESS: ${{ secrets.VITE_TRIDENT_ESCROW_ADDRESS }}
          VITE_REPUTATION_BOND_ADDRESS: ${{ secrets.VITE_REPUTATION_BOND_ADDRESS }}

  # ── Deploy Python Backend → Railway (main branch only) ─────────
  deploy-python-backend:
    name: Deploy Python Backend to Railway
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    steps:
      - uses: actions/checkout@v4

      - name: Install Railway CLI
        run: npm install -g @railway/cli

      - name: Deploy Python backend
        env:
          RAILWAY_TOKEN: ${{ secrets.RAILWAY_TOKEN_PYTHON }}
        run: railway up --directory apps/backend

  # ── Deploy Node Backend → Railway (main branch only) ───────────
  deploy-node-backend:
    name: Deploy Node Backend to Railway
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    steps:
      - uses: actions/checkout@v4

      - name: Install Railway CLI
        run: npm install -g @railway/cli

      - name: Deploy Node backend
        env:
          RAILWAY_TOKEN: ${{ secrets.RAILWAY_TOKEN_NODE }}
        run: railway up --directory apps/node-backend
