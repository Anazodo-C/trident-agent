name: Deploy Trident Agent

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  # ── Build check (every push / PR) ─────────────────────────────
  build-frontend:
    name: Build Frontend
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: apps/frontend/package-lock.json

      - name: Install
        working-directory: apps/frontend
        run: npm ci

      - name: Build
        working-directory: apps/frontend
        env:
          VITE_API_URL:                    ${{ secrets.VITE_API_URL || 'https://placeholder.railway.app' }}
          VITE_NODE_API_URL:               ${{ secrets.VITE_NODE_API_URL || 'https://placeholder-node.railway.app' }}
          VITE_WC_PROJECT_ID:              ${{ secrets.VITE_WC_PROJECT_ID || 'placeholder' }}
          VITE_ARC_RPC_URL:                https://rpc.testnet.arc.network
          VITE_ARC_CHAIN_ID:               "5042002"
          VITE_TRIDENT_TOKEN_ADDRESS:      ${{ secrets.VITE_TRIDENT_TOKEN_ADDRESS || '0x5fc8e8b3DC37Bcbb7bC7F013F6a8C56375B40dF7' }}
          VITE_AGENT_REGISTRY_ADDRESS:     ${{ secrets.VITE_AGENT_REGISTRY_ADDRESS || '0x4C0b02279E7323d1EB5C4104B6f5e9d0EF87f4E5' }}
          VITE_TRIDENT_ESCROW_ADDRESS:     ${{ secrets.VITE_TRIDENT_ESCROW_ADDRESS || '0xA067efE0e348a36Cc411C098b5e537180366B460' }}
          VITE_REPUTATION_BOND_ADDRESS:    ${{ secrets.VITE_REPUTATION_BOND_ADDRESS || '0xF2e7c4A63eE02dc036b239511c2a40Bc9973f32D' }}
        run: npm run build

  # ── Vercel deploys via its own GitHub integration ──────────────
  # No CI deploy step — Vercel picks up every push to main and
  # builds using env vars set in the Vercel dashboard directly.

  # ── Railway backends deploy via their own GitHub integration ───
  # Both services redeploy on every push to main automatically.
